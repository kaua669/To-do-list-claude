<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tasks UBM</title>

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#6366f1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TaskFlow" />
  <meta name="description" content="Organize. Execute. Conquiste." />

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Favicon / Icons -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23080c14'/><path d='M25 50 L42 67 L75 33' stroke='%236366f1' stroke-width='10' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>

  <!-- AUTH OVERLAY -->
  <div id="auth-overlay" class="auth-overlay active">
    <div class="auth-bg">
      <div class="auth-orb auth-orb-1"></div>
      <div class="auth-orb auth-orb-2"></div>
      <div class="auth-orb auth-orb-3"></div>
    </div>

    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-text">Tasks</span>
      </div>
      <p class="auth-tagline">Organize. Execute. Conquiste.</p>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Entrar</button>
        <button class="auth-tab" data-tab="register">Criar Conta</button>
      </div>

      <!-- Login Form -->
      <div id="login-form" class="auth-form active">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button class="btn-primary btn-full" onclick="App.login()">Entrar</button>
        <button class="btn-demo" onclick="App.loginDemo()">⚡ Entrar como Demo</button>
      </div>

      <!-- Register Form -->
      <div id="register-form" class="auth-form">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="reg-name" placeholder="Seu nome" autocomplete="name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="seu@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="reg-password" placeholder="Mín. 6 caracteres" autocomplete="new-password" />
        </div>
        <button class="btn-primary btn-full" onclick="App.register()">Criar Conta</button>
      </div>

      <div id="auth-error" class="auth-error"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="app hidden">

    <!-- MOBILE HEADER (only visible on mobile) -->
    <header class="mobile-header">
      <div class="mobile-header-logo">
        <span>Tasks UBM</span>
      </div>
      <div class="mobile-header-actions">
        <button class="btn-icon" onclick="App.toggleNotifications()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 01-3.46 0"></path></svg>
          <span class="notif-dot"></span>
        </button>
        <button class="btn-icon" onclick="App.logout()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path><polyline points="16,17 21,12 16,7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </button>
      </div>
    </header>

    <!-- SIDEBAR (desktop only) -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="logo">    
          <span class="logo-text">Tasks UBM</span>
        </div>
        <button class="sidebar-toggle" onclick="App.toggleSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <span class="nav-label">Principal</span>
          <a class="nav-item active" data-page="dashboard" onclick="App.navigate('dashboard')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            <span>Dashboard</span>
          </a>
          <a class="nav-item" data-page="tasks" onclick="App.navigate('tasks')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path></svg>
            <span>Tarefas</span>
            <span class="nav-badge" id="tasks-badge">0</span>
          </a>
          <a class="nav-item" data-page="agenda" onclick="App.navigate('agenda')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            <span>Agenda</span>
          </a>
          <a class="nav-item" data-page="notes" onclick="App.navigate('notes')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path><polyline points="14,2 14,8 20,8"></polyline></svg>
            <span>Notas</span>
          </a>
          <a class="nav-item" data-page="habits" onclick="App.navigate('habits')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
            <span>Hábitos</span>
          </a>
        </div>

        <div class="nav-section">
          <span class="nav-label">Ferramentas</span>
          <a class="nav-item" data-page="pomodoro" onclick="App.navigate('pomodoro')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12,6 12,12 16,14"></polyline></svg>
            <span>Pomodoro</span>
          </a>
          <a class="nav-item" data-page="tools" onclick="App.navigate('tools')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"></path></svg>
            <span>Ferramentas</span>
          </a>
        </div>

        <div class="nav-section">
          <span class="nav-label">Conta</span>
          <a class="nav-item" data-page="profile" onclick="App.navigate('profile')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Perfil</span>
          </a>
        </div>
      </nav>

      <div class="sidebar-user" onclick="App.navigate('profile')">
        <div class="user-avatar" id="sidebar-avatar">JS</div>
        <div class="user-info">
          <span class="user-name" id="sidebar-name">Carregando...</span>
          <span class="user-points" id="sidebar-points">0 pts</span>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- TOP BAR (desktop only) -->
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="page-title" id="page-title">Dashboard</h1>
          <span class="page-date" id="current-date"></span>
        </div>
        <div class="topbar-right">
          <div class="search-bar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="global-search" placeholder="Buscar..." oninput="App.globalSearch(this.value)" />
          </div>
          <button class="btn-icon" onclick="CategoryManager.openModal()" title="Gerenciar Categorias" style="position:relative">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M17 14v6M14 17h6"/></svg>
          </button>
          <button class="btn-icon" onclick="ExportManager.openModal()" title="Exportar para Excel" style="position:relative;border-color:rgba(6,214,160,0.3)">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#06d6a0" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button class="btn-icon notification-btn" onclick="App.toggleNotifications()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 01-3.46 0"></path></svg>
            <span class="notif-dot"></span>
          </button>
          <button class="btn-icon" onclick="App.logout()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path><polyline points="16,17 21,12 16,7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          </button>
        </div>
      </header>

      <!-- PAGE CONTENT -->
      <div class="page-content" id="page-content">
        <!-- Dynamically rendered by JS -->
      </div>

    </main>

    <!-- MOBILE BOTTOM NAVIGATION -->
    <nav class="mobile-bottom-nav" id="mobile-bottom-nav">
      <button class="mobile-nav-item active" data-page="dashboard" onclick="App.navigate('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        Início
      </button>
      <button class="mobile-nav-item" data-page="tasks" onclick="App.navigate('tasks')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path></svg>
        Tarefas
        <span class="mobile-nav-badge" id="mobile-tasks-badge" style="display:none">0</span>
      </button>
      <button class="mobile-nav-item" data-page="habits" onclick="App.navigate('habits')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
        Hábitos
      </button>
      <button class="mobile-nav-item" data-page="agenda" onclick="App.navigate('agenda')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        Agenda
      </button>
      <button class="mobile-nav-item" onclick="MobileNav.openMore()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="12" r="1"></circle><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle></svg>
        Mais
      </button>
    </nav>

    <!-- MOBILE MORE SHEET -->
    <div class="mobile-sheet-overlay" id="mobile-sheet-overlay" onclick="MobileNav.closeMore()"></div>
    <div class="mobile-more-sheet" id="mobile-more-sheet">
      <div class="mobile-more-handle"></div>
      <div class="mobile-more-grid">
        <button class="mobile-more-item" onclick="App.navigate('notes'); MobileNav.closeMore()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path><polyline points="14,2 14,8 20,8"></polyline></svg>
          Notas
        </button>
        <button class="mobile-more-item" onclick="App.navigate('pomodoro'); MobileNav.closeMore()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12,6 12,12 16,14"></polyline></svg>
          Pomodoro
        </button>
        <button class="mobile-more-item" onclick="App.navigate('tools'); MobileNav.closeMore()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"></path></svg>
          Ferramentas
        </button>
        <button class="mobile-more-item" onclick="App.navigate('profile'); MobileNav.closeMore()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          Perfil
        </button>
        <button class="mobile-more-item" onclick="CategoryManager.openModal(); MobileNav.closeMore()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M17 14v6M14 17h6"/></svg>
          Categorias
        </button>
        <button class="mobile-more-item" onclick="ExportManager.openModal(); MobileNav.closeMore()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#06d6a0" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exportar
        </button>
      </div>
    </div>

  </div>

  <!-- GLOBAL MODAL -->
  <div id="modal-overlay" class="modal-overlay" onclick="App.closeModal(event)">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button class="btn-icon" onclick="App.closeModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast-container" class="toast-container"></div>

  <!-- SCRIPTS -->
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/tasks.js"></script>
  <script src="js/pages/agenda.js"></script>
  <script src="js/pages/notes.js"></script>
  <script src="js/pages/habits.js"></script>
  <script src="js/pages/pomodoro.js"></script>
  <script src="js/pages/tools.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/export.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/app.js"></script>

  <script>
    // ── MOBILE NAV CONTROLLER ──────────────────────────────
    const MobileNav = {
      openMore() {
        document.getElementById('mobile-more-sheet').classList.add('open');
        document.getElementById('mobile-sheet-overlay').style.display = 'block';
      },
      closeMore() {
        document.getElementById('mobile-more-sheet').classList.remove('open');
        document.getElementById('mobile-sheet-overlay').style.display = 'none';
      },
      // Update active states on mobile nav
      setActive(page) {
        document.querySelectorAll('.mobile-nav-item[data-page]').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.page === page);
        });
        // Update badge
        const badge = document.getElementById('mobile-tasks-badge');
        const desktopBadge = document.getElementById('tasks-badge');
        if (badge && desktopBadge) {
          const count = desktopBadge.textContent;
          badge.textContent = count;
          badge.style.display = count > 0 ? 'flex' : 'none';
        }
      }
    };

    // ── PWA SERVICE WORKER REGISTRATION ───────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          console.log('✅ Service Worker registrado:', reg.scope);
        }).catch(err => {
          console.log('SW registro falhou:', err);
        });
      });
    }

    // ── PATCH App.navigate to sync mobile nav ─────────────
    window.addEventListener('DOMContentLoaded', () => {
      const originalNavigate = App.navigate?.bind(App);
      if (originalNavigate) {
        App.navigate = function(page, ...args) {
          MobileNav.setActive(page);
          return originalNavigate(page, ...args);
        };
      }
    });
  </script>
</body>
</html>
